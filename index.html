<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Regional Cup: GP East</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0a2a52;
  --navy-deep:#071c39;
  --navy-mid:#123a6e;
  --red:#c8102e;
  --red-dark:#9c0c24;
  --cream:#f5f3ee;
  --white:#ffffff;
  --gold:#e8b13a;
  --green:#1e8e4f;
  --green-dark:#15693a;
  --text-light:rgba(255,255,255,0.72);
  --text-faint:rgba(255,255,255,0.45);
  --line:rgba(255,255,255,0.10);
  --line-strong:rgba(255,255,255,0.18);
  --shadow: 0 10px 30px rgba(4,12,28,0.45);
  --radius:14px;
  --font-display:'Archivo Black', 'Arial Black', sans-serif;
  --font-body:'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:'Roboto Mono', monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(200,16,46,0.18), transparent 60%),
    radial-gradient(1000px 700px at 10% 110%, rgba(18,58,110,0.35), transparent 60%),
    var(--navy-deep);
  color:var(--white);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#root{min-height:100vh; display:flex; flex-direction:column;}

@font-face{
  font-family:'Archivo Black';
  src: local('Archivo Black');
}

a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15); border-radius:6px34

/* ============ TOP BAR ============ */
.topbar{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(180deg, rgba(7,28,57,0.97), rgba(7,28,57,0.90));
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  max-width:1320px; margin:0 auto;
  display:flex; align-items:center; gap:16px;
  padding:12px 20px;
}
.crest{
  width:46px; height:46px; border-radius:10px; object-fit:cover;
  box-shadow:0 4px 14px rgba(0,0,0,0.4);
  flex-shrink:0;
}
.brand{display:flex; flex-direction:column; line-height:1.05; flex-shrink:0;}
.brand-top{font-family:var(--font-display); font-size:15px; letter-spacing:0.06em; color:var(--white);}
.brand-bottom{font-family:var(--font-display); font-size:15px; letter-spacing:0.06em; color:var(--red); }
.topbar-spacer{flex:1;}
.mode-pill{
  display:flex; align-items:center; gap:8px;
  padding:7px 14px; border-radius:999px;
  border:1px solid var(--line-strong);
  background:rgba(255,255,255,0.04);
  font-size:12.5px; font-weight:600; letter-spacing:0.04em;
  color:var(--text-light);
}
.mode-pill.admin{border-color:rgba(232,177,58,0.5); color:var(--gold); background:rgba(232,177,58,0.08);}
.mode-dot{width:8px; height:8px; border-radius:50%; background:var(--green);}
.mode-pill.admin .mode-dot{background:var(--gold);}
.btn-mode{
  padding:8px 16px; border-radius:10px; border:1px solid var(--line-strong);
  background:rgba(255,255,255,0.04); color:var(--white);
  font-size:13px; font-weight:600; letter-spacing:0.02em;
  transition:all .15s ease;
}
.btn-mode:hover{background:rgba(255,255,255,0.09); border-color:rgba(255,255,255,0.3);}
.btn-mode.active{background:var(--red); border-color:var(--red);}

/* ============ NAV ============ */
.navbar{
  background:var(--navy);
  border-bottom:1px solid var(--line);
  position:sticky; top:70px; z-index:40;
  overflow-x:auto;
  scrollbar-width:none;
}
.navbar::-webkit-scrollbar{display:none;}
.navbar-inner{
  max-width:1320px; margin:0 auto;
  display:flex; gap:2px; padding:0 14px;
  min-width:max-content;
}
.nav-tab{
  padding:14px 18px; font-size:13px; font-weight:700;
  letter-spacing:0.05em; text-transform:uppercase;
  color:var(--text-light); background:transparent; border:none;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  transition:all .15s ease;
}
.nav-tab:hover{color:var(--white);}
.nav-tab.active{color:var(--white); border-bottom-color:var(--red);}

/* ============ LAYOUT ============ */
.page{max-width:1320px; margin:0 auto; width:100%; padding:24px 20px 80px; flex:1;}
.section-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap;}
.section-title{font-family:var(--font-display); font-size:22px; letter-spacing:0.02em; text-transform:uppercase;}
.section-sub{font-size:13px; color:var(--text-light);}
.eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--red); font-weight:700; margin-bottom:6px; display:block;
}

/* ============ CARDS ============ */
.card{
  background:linear-gradient(155deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:20px;
}
.card-flat{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line); border-radius:12px;
}

/* grid helpers */
.grid{display:grid; gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-auto{grid-template-columns:repeat(auto-fit, minmax(220px,1fr));}
@media(max-width:900px){
  .grid-2, .grid-3, .grid-4{grid-template-columns:1fr 1fr;}
}
@media(max-width:640px){
  .grid-2, .grid-3, .grid-4{grid-template-columns:1fr;}
}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 22px; border-radius:10px; border:1px solid var(--line-strong);
  background:rgba(255,255,255,0.04); color:var(--white);
  font-size:13.5px; font-weight:700; letter-spacing:0.03em;
  transition:all .15s ease;
}
.btn:hover{background:rgba(255,255,255,0.10); transform:translateY(-1px);}
.btn:disabled{opacity:0.4; cursor:not-allowed; transform:none;}
.btn-primary{background:var(--red); border-color:var(--red);}
.btn-primary:hover{background:var(--red-dark);}
.btn-gold{background:var(--gold); border-color:var(--gold); color:var(--navy-deep);}
.btn-gold:hover{background:#d39e2a;}
.btn-ghost{background:transparent;}
.btn-sm{padding:7px 14px; font-size:12px;}
.btn-full{width:100%;}

/* ============ FORM ============ */
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
.field label{font-size:11.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-light);}
.field input, .field select, .field textarea{
  padding:11px 13px; border-radius:9px; border:1px solid var(--line-strong);
  background:rgba(255,255,255,0.05); color:var(--white); font-size:14px;
  outline:none; transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--red);}
.field input::placeholder, .field textarea::placeholder{color:var(--text-faint);}
.field select option{background:var(--navy);}

/* ============ TAGS / BADGES ============ */
.badge{
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700;
  letter-spacing:0.05em; text-transform:uppercase;
}
.badge-green{background:rgba(30,142,79,0.18); color:#5fd996; border:1px solid rgba(30,142,79,0.4);}
.badge-red{background:rgba(200,16,46,0.18); color:#ff6b7f; border:1px solid rgba(200,16,46,0.45);}
.badge-gold{background:rgba(232,177,58,0.16); color:var(--gold); border:1px solid rgba(232,177,58,0.4);}
.badge-neutral{background:rgba(255,255,255,0.06); color:var(--text-light); border:1px solid var(--line-strong);}
.badge-live{background:rgba(232,177,58,0.16); color:var(--gold); border:1px solid rgba(232,177,58,0.4); animation:live-pulse 1.6s ease-in-out infinite;}
@keyframes live-pulse{0%,100%{opacity:1;} 50%{opacity:0.55;}}

/* ============ FLAG / TEAM CHIP ============ */
.team-chip{display:flex; align-items:center; gap:10px;}
.flag{
  width:28px; height:20px; border-radius:3px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; box-shadow:0 1px 4px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.15);
  background-size:cover; background-position:center;
}
.portfolio-name{font-size:11px; color:var(--text-faint); font-weight:500;}

/* ============ LOADING / SPLASH ============ */
.app-loading{
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background:var(--navy-deep); z-index:999; flex-direction:column; gap:18px;
}
.app-loading img{width:84px; height:84px; border-radius:18px; animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1); opacity:1;} 50%{transform:scale(1.06); opacity:0.85;}}

/* utility */
.flex{display:flex;}
.flex-col{display:flex; flex-direction:column;}
.items-center{align-items:center;}
.justify-between{justify-content:space-between;}
.gap-8{gap:8px;} .gap-12{gap:12px;} .gap-16{gap:16px;}
.mt-8{margin-top:8px;} .mt-12{margin-top:12px;} .mt-16{margin-top:16px;} .mt-24{margin-top:24px;}
.mb-8{margin-bottom:8px;} .mb-12{margin-bottom:12px;} .mb-16{margin-bottom:16px;}
.text-faint{color:var(--text-faint);}
.text-light{color:var(--text-light);}
.text-red{color:var(--red);}
.text-green{color:#5fd996;}
.text-gold{color:var(--gold);}
.text-center{text-align:center;}
.text-right{text-align:right;}
.mono{font-family:var(--font-mono);}
.fw-700{font-weight:700;} .fw-800{font-weight:800;}
.fs-12{font-size:12px;} .fs-13{font-size:13px;} .fs-24{font-size:24px;} .fs-32{font-size:32px;}
.w-full{width:100%;}
.empty-state{padding:40px 20px; text-align:center; color:var(--text-faint); font-size:14px;}
.empty-state .big{font-size:32px; margin-bottom:8px;}

/* ============ TABLE ============ */
.table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--line);}
table{width:100%; border-collapse:collapse; font-size:13px;}
th{
  text-align:left; padding:11px 12px; background:rgba(255,255,255,0.04);
  font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-light);
  border-bottom:1px solid var(--line); font-weight:700; white-space:nowrap;
}
td{padding:11px 12px; border-bottom:1px solid var(--line); white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,0.02);}
.col-right{text-align:right;}
.col-center{text-align:center;}

/* ============ MATCH CARD ============ */
.match-card{
  border-radius:12px; border:1px solid var(--line); overflow:hidden;
  background:rgba(255,255,255,0.03);
  transition:border-color .15s;
}
.match-card.status-red{border-color:rgba(200,16,46,0.5); background:rgba(200,16,46,0.06);}
.match-card.status-green{border-color:rgba(30,142,79,0.35);}
.match-card.status-live{border-color:rgba(232,177,58,0.5); background:rgba(232,177,58,0.05);}
.match-card-head{
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 14px; font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--text-faint); border-bottom:1px solid var(--line); font-weight:700;
}
.match-card-body{padding:14px;}
@media(max-width:480px){.match-card-body{padding:11px;}}
.match-row{display:flex; align-items:center; gap:6px; flex-wrap:nowrap;}
.match-team{display:flex; align-items:center; gap:8px; flex:1 1 0; min-width:0; overflow:hidden;}
.match-score{font-family:var(--font-mono); font-weight:800; font-size:18px; min-width:54px; max-width:54px; text-align:center; flex-shrink:0;}
.match-vs{font-size:11px; color:var(--text-faint); padding:0 4px; flex-shrink:0; white-space:nowrap;}
.score-winner{color:var(--gold);}
.match-meta{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
.team-name{font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; flex:1 1 0;}

/* ============ BRACKET ============ */
.bracket-wrap{overflow-x:auto; padding-bottom:10px;}
.bracket{display:flex; gap:34px; min-width:max-content; padding:10px 4px;}
.bracket-round{display:flex; flex-direction:column; justify-content:center; gap:18px; min-width:200px;}
.bracket-round-title{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--text-faint); text-align:center; margin-bottom:6px; font-weight:700;
}
.bracket-match{
  border:1px solid var(--line); border-radius:10px; background:rgba(255,255,255,0.03);
  overflow:hidden;
}
.bracket-match.status-red{border-color:rgba(200,16,46,0.5);}
.bracket-team{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:8px 10px; font-size:12.5px; font-weight:700; border-bottom:1px solid var(--line);
}
.bracket-team:last-child{border-bottom:none;}
.bracket-team.winner{background:rgba(30,142,79,0.10);}
.bracket-team .bscore{font-family:var(--font-mono); color:var(--text-light); font-weight:800;}
.bracket-team.tbd{color:var(--text-faint); font-style:italic; font-weight:500;}

/* ============ DRAW ============ */
.draw-stage{
  border:1px solid var(--line); border-radius:18px; padding:34px 24px;
  background:radial-gradient(circle at 50% 30%, rgba(200,16,46,0.10), transparent 60%);
  text-align:center; position:relative; overflow:hidden;
}
.draw-ball{
  width:120px; height:120px; border-radius:50%; margin:0 auto 20px;
  background:linear-gradient(160deg, var(--navy-mid), var(--navy-deep));
  border:3px solid var(--line-strong);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:28px;
  box-shadow:0 0 0 8px rgba(255,255,255,0.02), var(--shadow);
}
.draw-ball.spinning{animation:spin-ball 0.9s linear infinite;}
@keyframes spin-ball{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.08);}
  100%{transform:rotate(360deg) scale(1);}
}
.draw-reveal{
  display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:24px;
  max-width:560px; margin-left:auto; margin-right:auto;
}
@media(max-width:640px){.draw-reveal{grid-template-columns:1fr;}}
.draw-reveal-item{
  border:1px solid var(--line); border-radius:12px; padding:16px;
  background:rgba(255,255,255,0.03);
  animation:reveal-in 0.4s ease;
}
@keyframes reveal-in{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
.draw-reveal-label{font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px; font-weight:700;}
.draw-reveal-value{font-size:15px; font-weight:800;}
.draw-progress-bar{
  width:100%; height:8px; border-radius:999px; background:rgba(255,255,255,0.08); overflow:hidden; margin-top:6px;
}
.draw-progress-fill{height:100%; background:linear-gradient(90deg, var(--red), var(--gold)); transition:width .4s ease;}
.draw-list{max-height:340px; overflow-y:auto;}

/* ============ HOME HERO ============ */
.hero{
  position:relative; border-radius:20px; overflow:hidden; padding:40px 32px;
  background:
    linear-gradient(120deg, rgba(200,16,46,0.30), transparent 55%),
    linear-gradient(245deg, rgba(18,58,110,0.55), var(--navy-deep) 70%);
  border:1px solid var(--line);
}
.hero-crest{
  position:absolute; right:-30px; top:-30px; width:240px; height:240px; opacity:0.10;
  filter:blur(0px);
}
.hero-eyebrow{font-family:var(--font-mono); font-size:12px; letter-spacing:0.22em; color:var(--gold); font-weight:700; text-transform:uppercase;}
.hero-title{font-family:var(--font-display); font-size:clamp(28px,5vw,46px); line-height:1.05; margin:10px 0 14px; text-transform:uppercase;}
.hero-desc{font-size:14.5px; color:var(--text-light); max-width:560px; line-height:1.6;}
.hero-stats{display:flex; gap:20px; margin-top:24px; flex-wrap:wrap;}
.hero-stat-num{font-family:var(--font-display); font-size:32px; color:var(--white);}
.hero-stat-label{font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); margin-top:2px;}

/* ============ COUNTDOWN ============ */
.countdown{display:flex; gap:10px;}
.countdown-box{
  background:rgba(255,255,255,0.05); border:1px solid var(--line-strong); border-radius:10px;
  padding:10px 14px; text-align:center; min-width:64px;
}
.countdown-num{font-family:var(--font-mono); font-size:22px; font-weight:800;}
.countdown-label{font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); margin-top:2px;}

/* ============ MODAL ============ */
.modal-overlay{
  position:fixed; inset:0; background:rgba(4,12,28,0.7); backdrop-filter:blur(4px);
  display:flex; align-items:flex-start; justify-content:center; z-index:200;
  padding:20px; padding-top:min(10vh, 40px); overflow-y:auto;
}
.modal{
  background:var(--navy); border:1px solid var(--line-strong); border-radius:16px;
  max-width:480px; width:100%; padding:26px; box-shadow:var(--shadow);
  max-height:88vh; overflow-y:auto;
}
.modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
.modal-close{
  width:30px; height:30px; border-radius:8px; border:1px solid var(--line-strong);
  background:rgba(255,255,255,0.04); display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--white);
}

/* ============ ALERT ============ */
.alert{
  border-radius:10px; padding:12px 14px; font-size:13px; border:1px solid;
  display:flex; align-items:flex-start; gap:10px; line-height:1.5;
}
.alert-info{background:rgba(18,58,110,0.25); border-color:rgba(18,58,110,0.6); color:var(--text-light);}
.alert-warn{background:rgba(232,177,58,0.10); border-color:rgba(232,177,58,0.4); color:var(--gold);}
.alert-error{background:rgba(200,16,46,0.10); border-color:rgba(200,16,46,0.4); color:#ff8a96;}
.alert-success{background:rgba(30,142,79,0.10); border-color:rgba(30,142,79,0.4); color:#5fd996;}

/* ============ AWARD CARD ============ */
.award-card{
  border:1px solid var(--line); border-radius:14px; padding:20px;
  background:linear-gradient(155deg, rgba(232,177,58,0.07), rgba(255,255,255,0.02));
  position:relative; overflow:hidden;
}
.award-icon{font-size:30px; margin-bottom:10px; display:block;}
.award-title{font-family:var(--font-display); font-size:14px; letter-spacing:0.04em; text-transform:uppercase; margin-bottom:4px;}
.award-winner{font-size:18px; font-weight:800; margin-top:8px;}
.award-stat{font-size:12px; color:var(--text-light); margin-top:4px;}

/* ============================================================
   RESPONSIVE / MOBILE OVERRIDES
   Breakpoints:
     900px  - tablet landscape / small laptop
     768px  - tablet portrait
     640px  - large phones
     480px  - small phones
     360px  - very small phones
   ============================================================ */

/* ---- safe-area insets for notched / home-bar phones ---- */
@supports (padding-bottom: env(safe-area-inset-bottom)){
  .page{padding-bottom: calc(80px + env(safe-area-inset-bottom));}
  @media(max-width:640px){
    .page{padding-bottom: calc(70px + env(safe-area-inset-bottom));}
  }
}

/* ============ 900px — tablet landscape / small laptop ============ */
@media(max-width:900px){
  .page{padding:18px 16px 72px;}
  .hero{padding:32px 24px;}
  .hero-crest{width:200px; height:200px;}
  .section-head{gap:12px;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
}

/* ============ 768px — tablet portrait ============ */
@media(max-width:768px){
  .page{padding:16px 14px 70px;}
  .topbar-inner{padding:10px 16px; gap:12px;}
  .standings-col-p{display:none;}
}

/* ============ 640px — phones (landscape + large portrait) ============ */
@media(max-width:640px){
  /* ---- Layout ---- */
  .page{padding:12px 12px 70px;}

  /* ---- Top bar ---- */
  .topbar-inner{padding:8px 12px; gap:8px;}
  .crest{width:36px; height:36px; border-radius:8px;}

/* Build group -> array of portfolio slot indices (0-33), in order */
function buildGroupSlots(){
  const groups = {};
  let idx = 0;
  GROUP_NAMES.forEach(g=>{
    const size = GROUP_SIZES[g];
    groups[g] = [];
    for(let i=0;i<size;i++){ groups[g].push(idx); idx++; }
  });
  return groups; // total idx should be 34
}
const GROUP_SLOTS = buildGroupSlots();

/* ============================================================
   FIXTURE GENERATION (group stage)
   For 4-team groups: classic round robin, 3 matchdays x 1 game/team
   For 5-team groups: 8 fixtures across 3 matchdays so every team
   plays exactly 3 group games (one team plays a double-header in
   a single matchday window).
   ============================================================ */

// 4-team round robin (circle method) -> 3 rounds of 2 matches
function roundRobin4(teamIdxs){
  // teamIdxs: array of 4 slot-indices [t0,t1,t2,t3]
  const [a,b,c,d] = teamIdxs;
  return [
    [[a,b],[c,d]],
    [[a,c],[b,d]],
    [[a,d],[b,c]],
  ];
}

// 5-team schedule: each team plays 3 games, total 8 matches over 3 matchdays
function roundRobin5(teamIdxs){
  const [a,b,c,d,e] = teamIdxs;
  // edges among a,b,c,d form a 4-cycle (each plays 2 within group of 4)
  // e plays all of a,b,c,d (4 games) -> e ends with 4 games, others end with 3
  // distribute across 3 matchdays: MD1: a-b, c-d, e-a (3 matches)
  //                                  MD2: b-c, d-a... wait d-a already used? no edges_among = a-b,b-c,c-d,d-a
  // edges_among: a-b, b-c, c-d, d-a (4-cycle)
  // edges_with_e: e-a, e-b, e-c, e-d
  // MD1 (3 matches): a-b, c-d, e-... need e match too but team already used twice check not enforced
  // We'll lay out: MD1: [a-b, c-d, e-c]  MD2: [b-c, d-a, e-d]  MD3: [e-a, e-b]
  return [
    [[a,b],[c,d],[e,c]],
    [[b,c],[d,a],[e,d]],
    [[e,a],[e,b]],
  ];
}

/* Generate all group-stage fixtures given the draw assignment (slot -> portfolio mapping is identity;
   the "team" referenced in fixtures is the slot index 0-33, which the draw maps to country+group) */
function generateGroupFixtures(){
  const fixtures = [];
  GROUP_NAMES.forEach(g=>{
    const slots = GROUP_SLOTS[g];
    let schedule;
    if(slots.length===4) schedule = roundRobin4(slots);
    else schedule = roundRobin5(slots);
    schedule.forEach((mdMatches, mdi)=>{
      mdMatches.forEach(([t1,t2], mi)=>{
        fixtures.push({
          id: `G-${g}-MD${mdi+1}-${mi+1}`,
          stage:"group",
          group:g,
          matchday: mdi+1,
          weekStart: MATCHDAYS[mdi].weekStart,
          teamA: t1, // slot index
          teamB: t2,
          deals: {A:null,B:null},
          disb: {A:null,B:null},
          status: "pending", // pending | red | green
          scoreSaved: false,
          dispute: null, // {name, reason, status, feedback}
        });
      });
    });
  });
  return fixtures;
}

/* Bracket fixture skeleton - slots populated after group stage */
function generateBracketFixtures(){

      status:"pending", scoreSaved:false, dispute:null,

      teamA:null, teamB:null, deals:{A:null,B:null}, disb:{A:null,B:null},
      status:"pending", scoreSaved:false, dispute:null,

/* Public: insert a new dispute row. Does NOT touch tournament_state.
   Validates and trims all input before sending. Returns {ok, error}. */
async function submitDispute(matchId, name, reason){
  // --- input validation ---
  const nameTrimmed   = (name   || "").trim();
  const reasonTrimmed = (reason || "").trim();
  if (!nameTrimmed || !reasonTrimmed)
    return { ok: false, error: "Name and reason are required." };
  if (nameTrimmed.length < 2 || nameTrimmed.length > 120)
    return { ok: false, error: "Name must be between 2 and 120 characters." };
  if (reasonTrimmed.length < 5 || reasonTrimmed.length > 1000)
    return { ok: false, error: "Reason must be between 5 and 1000 characters." };
  if (!matchId)
    return { ok: false, error: "Invalid fixture." };
  // --- network insert ---
  try{
    const { error } = await supabaseClient
      .from('match_disputes')
      .insert([{
        tournament_id: TOURNAMENT_ID,
        match_id: matchId,
        // Values are already trimmed; Supabase stores plain text, not HTML.
        name:   nameTrimmed,
        reason: reasonTrimmed,
        status: 'open',
      }]);
    if(error){ console.error("submitDispute error:", error); return { ok: false, error: "Failed to submit. Please try again." }; }
    return { ok: true, error: null };
  }catch(e){ console.error("submitDispute exception:", e); return { ok: false, error: "Network error. Please try again." }; }
}

/* Admin: update a dispute row (feedback + status) */
async function resolveDisputeRow(disputeId, feedback, resolvedBy){

/* Fisher-Yates shuffle */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ============================================================
   CALCULATION ENGINE
   ============================================================ */

/* Safe money parser — handles R, commas, spaces, null, undefined, NaN */
function parseMoneyNumber(value){
  if(value === null || value === undefined || value === "") return 0;
  if(typeof value === "number") return Number.isFinite(value) ? value : 0;
  const cleaned = String(value).replace(/[R,\s]/g, "");
  const parsed = Number(cleaned);
  return Number.isFinite(parsed) ? parsed : 0;
}

/* New scoring formula:
   scorePercent = (((portfolio.ytd + matchDisb) / annualTarget) - (portfolio.ytd / annualTarget)) * 100
   = (matchDisb / annualTarget) * 100
   This is the INCREASE in annual target attainment caused by this match disbursement.
*/
function calculateMatchScoreIncrease(portfolioYtd, matchDisbursedAmount, annualTarget){
  const ytd = parseMoneyNumber(portfolioYtd);
  const disbursed = parseMoneyNumber(matchDisbursedAmount);
  const target = parseMoneyNumber(annualTarget);

  if(!target || target <= 0) return 0;
  if(!disbursed || disbursed <= 0) return 0;

  const beforeAttainment = ytd / target;
  const afterAttainment = (ytd + disbursed) / target;
  const result = (afterAttainment - beforeAttainment) * 100;
  return Number.isFinite(result) ? result : 0;
}

/* Cumulative attainment (CUM) = total YTD% vs target achieved so far (latest recorded ytd / target * 100) */
function cumAttainment(portfolio, uptoWeek){
  if(!portfolio || !portfolio.annualTarget) return 0;
  let latestYtd = 0;
  const order = [1,2,3,"R16","QF","SF","F"];
  const idx = order.indexOf(uptoWeek);
  const slice = idx>=0 ? order.slice(0, idx+1) : order;
  slice.forEach(w=>{
    if(portfolio.ytdHistory[w]!==undefined && portfolio.ytdHistory[w]!==null){
      latestYtd = portfolio.ytdHistory[w];
    }
  });
  return (latestYtd/portfolio.annualTarget)*100;
}

/* Compute fixture result using new match disbursement scoring.
   Score = % increase in annual target attainment caused by the match disbursed amount.
   portfolio.ytd (from Teams tab) is the pre-match YTD balance.
   fixture.disb.A / fixture.disb.B is the match disbursed amount entered by admin.
   Returns null only if teams are not yet assigned. */
function computeFixtureResult(fixture, portfolios){
  if(fixture.teamA===null || fixture.teamB===null) return null;
  const pA = portfolios[fixture.teamA];
  const pB = portfolios[fixture.teamB];

  // Score is 0 until admin saves a disb value; also 0 if portfolio data missing
  const scoreA = calculateMatchScoreIncrease(
    pA ? pA.ytd : 0,
    fixture.disb.A,
    pA ? pA.annualTarget : 0
  );
  const scoreB = calculateMatchScoreIncrease(
    pB ? pB.ytd : 0,
    fixture.disb.B,
    pB ? pB.annualTarget : 0
  );

  let winner = null; // 'A' | 'B' | 'draw'
  if(fixture.stage==="group"){
    if(scoreA>scoreB) winner="A";
    else if(scoreB>scoreA) winner="B";
    else winner="draw";
  } else {
    // bracket: no draws — tie broken by deals, then fallback
    if(scoreA>scoreB) winner="A";
    else if(scoreB>scoreA) winner="B";
    else {
      const dA = fixture.deals.A||0, dB = fixture.deals.B||0;
      if(dA>dB) winner="A";
      else if(dB>dA) winner="B";
      else winner="A"; // fully tied fallback — admin should resolve manually via deals
    }
  }
  return {scoreA, scoreB, winner};
}

/* ============================================================
   STANDINGS
   Points: win=3, draw=1, loss=0 (group stage only)
   CUM: cumulative attainment % (constant metric, all stages)
   Peak: highest single-week attainment recorded so far
   ============================================================ */
function computeGroupStandings(state, group){
  const slots = GROUP_SLOTS[group];
  const table = {};
  slots.forEach(s=>{
    table[s] = {
      slot:s, points:0, played:0, wins:0, draws:0, losses:0,
      cum:0, peak:-Infinity, sumAttain:0, lowestAttain:Infinity,
    };
  });
  const fixtures = state.fixtures.filter(f=>f.stage==="group" && f.group===group && f.status==="green");
  fixtures.forEach(f=>{
    const res = computeFixtureResult(f, state.portfolios);
    if(!res) return;
    const rowA = table[f.teamA], rowB = table[f.teamB];
    rowA.played++; rowB.played++;
    rowA.sumAttain += res.scoreA; rowB.sumAttain += res.scoreB;
    rowA.peak = Math.max(rowA.peak, res.scoreA);
    rowB.peak = Math.max(rowB.peak, res.scoreB);
    rowA.lowestAttain = Math.min(rowA.lowestAttain, res.scoreA);
    rowB.lowestAttain = Math.min(rowB.lowestAttain, res.scoreB);
    if(res.winner==="A"){ rowA.points+=3; rowA.wins++; rowB.losses++; }
    else if(res.winner==="B"){ rowB.points+=3; rowB.wins++; rowA.losses++; }
    else { rowA.points+=1; rowB.points+=1; rowA.draws++; rowB.draws++; }
  });
  // CUM = current cumulative attainment, computed from portfolio ytdHistory at latest finalized week
  slots.forEach(s=>{
    table[s].cum = cumAttainment(state.portfolios[s], 3);
    if(table[s].peak===-Infinity) table[s].peak=0;
    if(table[s].lowestAttain===Infinity) table[s].lowestAttain=0;
  });
  // sort: points desc, CUM desc (tiebreak), peak desc, then portfolio name
  const rows = slots.map(s=>table[s]);
  rows.sort((a,b)=>{
    if(b.points!==a.points) return b.points-a.points;
    if(b.cum!==a.cum) return b.cum-a.cum;
    if(b.peak!==a.peak) return b.peak-a.peak;
    return a.slot-b.slot;
  });
  return rows;
}

/* Determine if a group's stage is complete: all group fixtures are green */
function isGroupComplete(state, group){
  const fixtures = state.fixtures.filter(f=>f.stage==="group" && f.group===group);
  return fixtures.length>0 && fixtures.every(f=>f.status==="green");
}
function isGroupStageComplete(state){
  return GROUP_NAMES.every(g=>isGroupComplete(state,g));
}

/* Populate bracket R16 slots once all groups complete */
function populateBracket(state){
  if(!isGroupStageComplete(state)) return state;
  const standingsByGroup = {};
  GROUP_NAMES.forEach(g=>{ standingsByGroup[g]=computeGroupStandings(state,g); });
  const newFixtures = state.fixtures.map(f=>({...f}));
  R16_PAIRINGS.forEach((pair,i)=>{
    const [winGroup, runnerGroup] = pair;
    const winner = standingsByGroup[winGroup][0].slot;
    const runnerUp = standingsByGroup[runnerGroup][1].slot;
    const fx = newFixtures.find(f=>f.id===`KO-R16-${i+1}`);
    if(fx && fx.teamA===null){
      fx.teamA = winner;
      fx.teamB = runnerUp;
    }
  });
  return {...state, fixtures:newFixtures};
}

/* Advance bracket: when a bracket fixture turns green, push winner into next round slot */
function advanceBracket(state){
  let fixtures = state.fixtures.map(f=>({...f}));
  const byId = {};
  fixtures.forEach(f=>{ byId[f.id]=f; });
  fixtures.forEach(f=>{
    if(f.stage!=="bracket") return;
    if(f.sourceA===undefined && f.sourceB===undefined) return;
  });
  // For QF/SF/F, pull winners from source matches if those are green
  fixtures.filter(f=>f.stage==="bracket" && f.sourceA).forEach(f=>{
    const srcA = byId[f.sourceA];
    const srcB = byId[f.sourceB];
    if(srcA && srcA.status==="green" && srcA.teamA!==null && srcA.teamB!==null){
      const res = computeFixtureResult(srcA, state.portfolios);
      f.teamA = res.winner==="A" ? srcA.teamA : srcA.teamB;
    }
    if(srcB && srcB.status==="green" && srcB.teamA!==null && srcB.teamB!==null){
      const res = computeFixtureResult(srcB, state.portfolios);
      f.teamB = res.winner==="A" ? srcB.teamA : srcB.teamB;
    }
  });
  return {...state, fixtures};
}

/* ============================================================
   AWARDS
   ============================================================ */
function computeAwards(state){
  const portfolios = state.portfolios.filter(p=>p.country); // only drawn teams
  if(portfolios.length===0) return null;

  // Build per-team weekly attainment list across all played (green) fixtures
  const weeklyData = {}; // slot -> [{week, attain, deals}]
  portfolios.forEach(p=>{ weeklyData[p.slot]=[]; });

  state.fixtures.filter(f=>f.status==="green" && f.teamA!==null && f.teamB!==null).forEach(f=>{
    const week = f.stage==="group" ? f.matchday : f.round;
    const res = computeFixtureResult(f, state.portfolios);
    if(!res) return;
    weeklyData[f.teamA] && weeklyData[f.teamA].push({week, attain:res.scoreA, deals:f.deals.A||0});
    weeklyData[f.teamB] && weeklyData[f.teamB].push({week, attain:res.scoreB, deals:f.deals.B||0});
  });

  let golden = null, consistency=null, comeback=null, dealOfTournament=null;

  // Golden Boot: highest single-match disbursement impact (% increase)
  Object.entries(weeklyData).forEach(([slot,arr])=>{
    arr.forEach(entry=>{
      if(!golden || entry.attain>golden.value){
        golden = {slot:Number(slot), value:entry.attain, week:entry.week};
      }
    });
  });

  // Consistency: best average match disbursement impact (min 1 game)
  Object.entries(weeklyData).forEach(([slot,arr])=>{
    if(arr.length===0) return;
    const avg = arr.reduce((s,e)=>s+e.attain,0)/arr.length;
    if(!consistency || avg>consistency.value){
      consistency = {slot:Number(slot), value:avg, games:arr.length};
    }
  });

  // Comeback: largest cumulative improvement from lowest starting point
  // = (latest cumulative attainment - lowest single-week attainment) for each team
  Object.entries(weeklyData).forEach(([slot,arr])=>{
    if(arr.length===0) return;
    const lowest = Math.min(...arr.map(e=>e.attain));
    const p = state.portfolios[Number(slot)];
    const latestCum = cumAttainment(p, "F");
    const improvement = latestCum - lowest;
    if(!comeback || improvement>comeback.value){
      comeback = {slot:Number(slot), value:improvement, lowest, latestCum};
    }
  });

  // Deal of the Tournament: largest single-deal % swing -> approximate as attain per deal, take fixture with max (attain/deals) where deals>0, fallback to max attain
  let best = null;
  state.fixtures.filter(f=>f.status==="green" && f.teamA!==null && f.teamB!==null).forEach(f=>{
    const res = computeFixtureResult(f, state.portfolios);
    if(!res) return;
    [["A",f.teamA,res.scoreA],["B",f.teamB,res.scoreB]].forEach(([side,slot,attain])=>{
      const deals = f.deals[side]||0;
      if(deals>0){
        const swing = attain/deals;
        if(!best || swing>best.swing){
          best = {slot, swing, attain, deals, matchId:f.id};
        }
      }
    });
  });
  dealOfTournament = best;

  const withTeam = (obj)=> obj ? {...obj, portfolio:state.portfolios[obj.slot]} : null;

  return {
    golden: withTeam(golden),
    consistency: withTeam(consistency),
    comeback: withTeam(comeback),
    dealOfTournament: withTeam(dealOfTournament),
  };
}

function buildInitialState(){
  // portfolios: 34 slots, each with name/target/ytd, country assigned via draw (null until drawn)
  const portfolios = [];
  for(let i=0;i<NUM_PORTFOLIOS;i++){
    portfolios.push({
      slot:i,
      portfolioName: PORTFOLIO_NAMES[i] || `Portfolio ${i+1}`,
      annualTarget: 0,
      ytd: 0,
      ytdHistory: {1:0,2:0,3:0}, // YTD recorded at end of each matchday for score calc

    });

  return {

      started:false,
      completed:false,

      revealedCount: 0,
    },
    portfolios,
    fixtures: [...generateGroupFixtures(), ...generateBracketFixtures()],
    activeWeek: 1, // 1,2,3 = group matchdays; 'R16','QF','SF','F' = bracket
    adminUnlocked: false,
  };
}

/* ============================================================
   DRAW LOGIC
   ============================================================ */
function slotToGroup(slot){
  for(const g of GROUP_NAMES){
    if(GROUP_SLOTS[g].includes(slot)) return g;
  }
  return null;
}

function generateDrawSequence(){
  const order = shuffle([...Array(NUM_PORTFOLIOS).keys()]);
  const countries = shuffle(COUNTRY_POOL).slice(0, NUM_PORTFOLIOS);
  return order.map((slot, i)=>({
    slot,
    country: countries[i],
    group: slotToGroup(slot),
  }));
}

/* ============================================================
   MASTER RECALCULATION
   ============================================================ */
function recalcAll(state){
  let next = {...state};
  next = populateBracket(next);
  next = advanceBracket(next);
  return next;
}

function fixtureColor(fixture){
  if(fixture.status==="red") return "red";
  if(fixture.status==="green") return "green";
  if(fixture.status==="live") return "live";
  return "pending";
}

function fmtPct(v){
  if(v===null || v===undefined || !Number.isFinite(v)) return "—";
  const sign = v>0 ? "+" : "";
  return `${sign}${v.toFixed(2)}%`;
}
function fmtCurrency(v){
  if(v===null || v===undefined) return "—";
  return "R" + Number(v).toLocaleString("en-ZA", {maximumFractionDigits:0});
}

function getTeam(state, slot){
  if(slot===null || slot===undefined) return null;
  const p = state.portfolios[slot];
  if(!p) return null;
  return p;
}

function getTournamentPhase(state){
  if(!state.draw.completed) return "draw";
  if(!isGroupStageComplete(state)) return "groups";
  const finalFx = state.fixtures.find(f=>f.id==="KO-F-1");
  if(finalFx && finalFx.status==="green") return "complete";
  return "bracket";
}

function daysUntil(dateStr){
  const target = new Date(dateStr+"T00:00:00");
  const now = new Date();
  const diff = target - now;
  return Math.ceil(diff/(1000*60*60*24));
}

function isDisputeWindowOpen(){
  const day = new Date().getDay();
  return day>=1 && day<=5;
}

function MatchScoreLine({state, fixture, adminMode}){
  const result = computeFixtureResult(fixture, state.portfolios);
  const teamsAssigned = fixture.teamA!==null && fixture.teamB!==null;
  const isFinal = fixture.status==="green" || fixture.status==="red";
  const isLive = fixture.status==="live";
  // Backward compat: scoreSaved missing → treat green/red as saved, pending/live as not saved
  const scoreSaved = fixture.scoreSaved !== undefined
    ? fixture.scoreSaved
    : (isFinal);
  const showScore = teamsAssigned && result!==null && scoreSaved;
  const winA = isFinal && result && result.winner==="A";
  const winB = isFinal && result && result.winner==="B";
  return (
    <div className="match-row">
      <div className="match-team">
        {/* adminMode gates portfolio surname display inside TeamCell */}
        <TeamCell state={state} slot={fixture.teamA} adminMode={adminMode}/>
      </div>
      <div className={"match-score" + (winA ? " score-winner" : "")}>
        {showScore ? fmtPct(result.scoreA) : "0.00%"}
      </div>
      <div className="match-vs">{isFinal ? "FT" : isLive ? "LIVE" : "vs"}</div>
      <div className={"match-score" + (winB ? " score-winner" : "")}>
        {showScore ? fmtPct(result.scoreB) : "0.00%"}
      </div>
      <div className="match-team" style={{justifyContent:"flex-end", textAlign:"right"}}>
        <TeamCell state={state} slot={fixture.teamB} adminMode={adminMode}/>
      </div>
    </div>
  );
}

   ============================================================ */
function getCurrentWeekKey(state){
  return state.activeWeek || 1;
}
function getFixturesForWeek(state, week){
  if(typeof week==="number"){
    return state.fixtures.filter(f=>f.stage==="group" && f.matchday===week);
  }
  return state.fixtures.filter(f=>f.stage==="bracket" && f.round===week);
}
function getWeekLabel(week){
  if(typeof week==="number") return `Matchday ${week}`;
  return {R16:"Round of 16", QF:"Quarter-Final", SF:"Semi-Final", F:"Final"}[week];
}
function getWeekDate(week){
  if(typeof week==="number") return MATCHDAYS[week-1]?.weekStart;
  return BRACKET_WEEKS[week]?.weekStart;
}

/* ============================================================
   HIGHLIGHTS GENERATOR
   Surfaces interesting storylines from standings, attainment,
   form, and upsets. Pure function of state - regenerates on
   every render so it always reflects the latest data.
   ============================================================ */
function generateHighlights(state){
  const drawn = state.portfolios.filter(p=>p.country);
  if(drawn.length===0) return [];
  const highlights = [];
  const teamLabel = (p)=> `${p.country.flag} ${p.country.name}`;

  // 1. Group leaders with highest CUM overall
  const allStandings = [];
  GROUP_NAMES.forEach(g=>{
    const rows = computeGroupStandings(state, g);
    rows.forEach((row,i)=> allStandings.push({...row, group:g, rank:i+1}));
  });
  const playedStandings = allStandings.filter(r=>r.played>0);

  if(playedStandings.length>0){
    // Tournament pace-setter: highest CUM
    const topCum = [...playedStandings].sort((a,b)=>b.cum-a.cum)[0];
    if(topCum){
      const p = state.portfolios[topCum.slot];
      highlights.push({
        icon:"🚀",
        title:"Pace-Setter",
        text: `${teamLabel(p)} leads all 34 teams with ${fmtPct(topCum.cum)} cumulative attainment, topping Group ${topCum.group}.`,
      });
    }

    // Highest single-week attainment (peak)
    const topPeak = [...playedStandings].sort((a,b)=>b.peak-a.peak)[0];
    if(topPeak && topPeak.slot!==topCum.slot){
      const p = state.portfolios[topPeak.slot];
      highlights.push({
        icon:"⚡",
        title:"Best Single Match",
        text: `${teamLabel(p)} posted the tournament's best single-match disbursement impact at ${fmtPct(topPeak.peak)}.`,
      });
    }

    // Perfect record so far (won every game played, played >=2)
    const perfect = playedStandings.find(r=>r.played>=2 && r.wins===r.played);
    if(perfect){
      const p = state.portfolios[perfect.slot];
      highlights.push({
        icon:"🔒",
        title:"Unbeaten Run",
        text: `${teamLabel(p)} have won all ${perfect.played} of their group games so far — a perfect start in Group ${perfect.group}.`,
      });
    }

    // Struggling team - lowest CUM among teams who've played
    const bottomCum = [...playedStandings].sort((a,b)=>a.cum-b.cum)[0];
    if(bottomCum && bottomCum.slot!==topCum.slot){
      const p = state.portfolios[bottomCum.slot];
      highlights.push({
        icon:"📉",
        title:"Off The Pace",
        text: `${teamLabel(p)} sit last overall on ${fmtPct(bottomCum.cum)} cumulative attainment — Group ${bottomCum.group}'s toughest week yet.`,
      });
    }

    // Tightest group race - smallest point gap between 1st and 2nd
    let tightest = null;
    GROUP_NAMES.forEach(g=>{
      const rows = computeGroupStandings(state,g);
      if(rows[0].played>0 && rows[1].played>0){
        const gap = rows[0].points - rows[1].points;
        const cumGap = Math.abs(rows[0].cum - rows[1].cum);
        if(!tightest || gap<tightest.gap || (gap===tightest.gap && cumGap<tightest.cumGap)){
          tightest = {group:g, gap, cumGap, rows};
        }
      }
    });
    if(tightest && tightest.gap<=1){
      const p1 = state.portfolios[tightest.rows[0].slot];
      const p2 = state.portfolios[tightest.rows[1].slot];
      highlights.push({
        icon:"🔥",
        title:"Tightest Race",
        text: `Group ${tightest.group} is on a knife-edge — ${teamLabel(p1)} and ${teamLabel(p2)} are separated by just ${tightest.cumGap.toFixed(1)} pts of cumulative attainment.`,
      });
    }
  }

  // Awards-derived highlights
  const awards = computeAwards(state);
  if(awards){
    if(awards.comeback && awards.comeback.value>5){
      const p = awards.comeback.portfolio;
      highlights.push({
        icon:"🔄",
        title:"Comeback Story",
        text: `${teamLabel(p)} have clawed back from a low of ${fmtPct(awards.comeback.lowest)} to ${fmtPct(awards.comeback.latestCum)} cumulative attainment — the tournament's biggest turnaround.`,
      });
    }
    if(awards.dealOfTournament){
      const p = awards.dealOfTournament.portfolio;
      highlights.push({
        icon:"💎",
        title:"Deal That Mattered",
        text: `A single disbursement from ${teamLabel(p)} drove a ${fmtPct(awards.dealOfTournament.attain)} portfolio attainment increase — the tournament's sharpest single-match impact.`,
      });
    }
  }

  // Bracket / knockout storylines
  if(isGroupStageComplete(state)){
    const r16 = state.fixtures.filter(f=>f.round==="R16" && f.teamA!==null && f.teamB!==null);
    if(r16.length===8 && !highlights.some(h=>h.title==="Bracket Set")){
      highlights.push({
        icon:"🏆",
        title:"Bracket Set",
        text: `Groups are settled — all 16 Round of 16 fixtures are confirmed and the knockout race begins ${BRACKET_WEEKS.R16.weekStart}.`,
      });
    }
  }
  const finalFx = state.fixtures.find(f=>f.id==="KO-F-1");
  if(finalFx && finalFx.status==="green"){
    const result = computeFixtureResult(finalFx, state.portfolios);
    const champ = result.winner==="A" ? state.portfolios[finalFx.teamA] : state.portfolios[finalFx.teamB];
    highlights.unshift({
      icon:"👑",
      title:"Champion Crowned",
      text: `${teamLabel(champ)} have won the Regional Cup: GP East 2026!`,
    });
  }

  // Fallback if nothing has happened yet
  if(highlights.length===0){
    highlights.push({
      icon:"🎬",
      title:"Tournament Underway",
      text: "Results will generate highlights here as matchdays are completed — check back after the first results are entered.",
    });
  }

  return highlights.slice(0,6);
}

        <span className="hero-eyebrow">{phaseLabel}</span>
        <h1 className="hero-title">Regional Cup<br/>GP East 2026</h1>
        <p className="hero-desc">
          34 portfolios. 8 groups. 4 Regions. One champion. Let your Weekly disbursement performance
          be recognized as you compete towards being crowned the first REGIONAL CUP CHAMPION.
          
        </p>
        <div className="hero-stats">
          <div>
            <div className="hero-stat-num">{drawnCount}/34</div>
            <div className="hero-stat-label">Portfolios drawn</div>
          </div>
          <div>
            <div className="hero-stat-num">{groupsComplete}/8</div>
            <div className="hero-stat-label">Groups complete</div>
          </div>
          <div>
            <div className="hero-stat-num">{state.fixtures.filter(f=>f.status==="green").length}</div>
            <div className="hero-stat-label">Matches final</div>
          </div>
          <div>
            <div className="hero-stat-num">{state.fixtures.filter(f=>f.status==="red").length}</div>
            <div className="hero-stat-label">Open disputes</div>
          </div>
        </div>
      </div>

      <div className="grid grid-3 mt-24">
        <div className="card">
          <span className="eyebrow">Key Dates</span>
          <div className="flex-col gap-12 mt-12">
            {MATCHDAYS.map(md=>(
              <div key={md.id} className="flex justify-between items-center">
                <span className="fs-13">{md.label}</span>
                <span className="fs-13 text-light mono">{md.weekStart}</span>
              </div>
            ))}
            <div style={{height:"1px", background:"var(--line)"}}/>
            <div className="flex justify-between items-center">
              <span className="fs-13">Round of 16</span>
              <span className="fs-13 text-light mono">{BRACKET_WEEKS.R16.weekStart}</span>
            </div>
            <div className="flex justify-between items-center">
              <span className="fs-13">Final</span>
              <span className="fs-13 text-gold mono fw-700">{BRACKET_WEEKS.F.weekStart}</span>
            </div>
          </div>
        </div>

        <div className="card">
          <span className="eyebrow">Countdown</span>
          <div className="fs-13 text-light mb-12 mt-12">{nextLabel}</div>
          <div className="countdown">
            <div className="countdown-box">
              <div className="countdown-num">{days>0?days:0}</div>
              <div className="countdown-label">Days</div>
            </div>
          </div>
          <div className="mt-16">
            <button className="btn btn-primary btn-full" onClick={()=>setTab(phase==="draw"?"draw":"fixtures")}>
              {phase==="draw" ? "Go to Live Draw" : "View Fixtures"}
            </button>
          </div>
        </div>

        <div className="card">
          <span className="eyebrow">Quick Links</span>
          <div className="flex-col gap-8 mt-12">
            <button className="btn btn-ghost btn-full" style={{justifyContent:"flex-start"}} onClick={()=>setTab("standings")}>📊 Group Standings</button>

function DrawTab({state, updateState, adminMode}){
  const [revealing, setRevealing] = useState(false);
  const [lastReveal, setLastReveal] = useState(null);
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  const seq = state.draw.sequence;
  const revealedCount = state.draw.revealedCount;
  const total = NUM_PORTFOLIOS;
  const isComplete = state.draw.completed;
  const canReveal = adminMode && seq.length>0 && revealedCount<total;

  const handleStartDraw = ()=>{
    const sequence = generateDrawSequence();
    updateState(prev=>({
      ...prev,
      draw: {started:true, completed:false, sequence, revealedCount:0},
    }));
    setLastReveal(null);
  };

  const handleReveal = ()=>{
    if(!canReveal || revealing) return;
    setRevealing(true);
    setTimeout(()=>{
      const idx = revealedCount;
      const pick = seq[idx];
      updateState(prev=>{
        const portfolios = prev.portfolios.map(p=>
          p.slot===pick.slot ? {...p, country:pick.country, group:pick.group} : p
        );
        const newRevealedCount = idx+1;
        return {
          ...prev,
          portfolios,
          draw: {...prev.draw, revealedCount:newRevealedCount, completed: newRevealedCount>=total},
        };
      });
      setLastReveal(pick);
      setRevealing(false);
    }, 1400);
  };

  const handleReset = ()=>{
    if(!adminMode) return;
    setShowResetConfirm(true);
  };

  const confirmReset = ()=>{
    const sequence = generateDrawSequence();
    updateState(prev=>{
      const portfolios = prev.portfolios.map(p=>({...p, country:null, group:null}));
      const fixtures = [...generateGroupFixtures(), ...generateBracketFixtures()];
      return {
        ...prev,
        portfolios,
        fixtures,
        draw: {started:true, completed:false, sequence, revealedCount:0},
      };
    });
    setLastReveal(null);
    setShowResetConfirm(false);
  };

  const revealedPicks = seq.slice(0, revealedCount);

  return (
    <div>
      <div className="section-head">
        <div>
          <span className="eyebrow">Live Draw</span>
          <div className="section-title">Portfolio &amp; Group Allocation</div>
        </div>
        {adminMode && (
          <div className="flex gap-12">
            {seq.length===0 && <button className="btn btn-primary" onClick={handleStartDraw}>Start Draw</button>}
            {seq.length>0 && <button className="btn" onClick={handleReveal} disabled={!canReveal || revealing}>
              {revealing ? "Revealing…" : `Reveal Next Pick (${revealedCount}/${total})`}
            </button>}
            <button className="btn btn-ghost" onClick={handleReset}>Reset Draw</button>
          </div>
        )}
      </div>

      <div className="draw-stage">
        <div className={"draw-ball" + (revealing?" spinning":"")}>
          {revealing ? "?" : (lastReveal ? lastReveal.country.flag : "🏆")}
        </div>
        {!isComplete && seq.length===0 && (
          <div className="text-light fs-13">
            {adminMode ? "Click \u201CStart Draw\u201D to generate a fresh randomized sequence for all 34 portfolios." : "The live draw has not started yet. Check back when the admin begins the draw."}
          </div>
        )}
        {!isComplete && seq.length>0 && !lastReveal && (
          <div className="text-light fs-13">Draw sequence ready. {adminMode ? "Click \u201CReveal Next Pick\u201D to begin revealing portfolio assignments." : "Waiting for the next pick to be revealed."}</div>
        )}
        {lastReveal && !revealing && (
          <div className="draw-reveal">
            <div className="draw-reveal-item">
              <div className="draw-reveal-label">Portfolio</div>
              {/* Portfolio surname — admin only; public sees slot number */}
              <div className="draw-reveal-value">
                {adminMode
                  ? state.portfolios[lastReveal.slot].portfolioName
                  : `Portfolio ${lastReveal.slot + 1}`}
              </div>
            </div>
            <div className="draw-reveal-item">
              <div className="draw-reveal-label">Assigned Team</div>
              <div className="draw-reveal-value">{lastReveal.country.flag} {lastReveal.country.name}</div>
            </div>
            <div className="draw-reveal-item">
              <div className="draw-reveal-label">Group</div>
              <div className="draw-reveal-value">Group {lastReveal.group}</div>
            </div>
          </div>
        )}
        {isComplete && !lastReveal && (
          <div className="alert alert-success" style={{maxWidth:"480px", margin:"0 auto"}}>
            ✅ The draw is complete. All 34 portfolios have been assigned to teams and groups.
          </div>
        )}
        <div className="draw-progress-bar" style={{maxWidth:"480px", margin:"20px auto 0"}}>
          <div className="draw-progress-fill" style={{width:`${(revealedCount/total)*100}%`}}/>
        </div>
        <div className="text-faint fs-12 mt-8">{revealedCount} of {total} portfolios revealed</div>
      </div>

      <div className="mt-24">
        <div className="section-head">
          <div className="section-title" style={{fontSize:"16px"}}>Draw Results</div>
        </div>
        {revealedPicks.length===0 ? (
          <EmptyState icon="🎟️" text="No picks revealed yet."/>
        ) : (
          <div className="table-wrap draw-list">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>{adminMode ? "Portfolio" : "Slot"}</th>
                  <th>Team</th>
                  <th>Group</th>
                </tr>
              </thead>
              <tbody>
                {revealedPicks.slice().reverse().map((pick, i)=>(
                  <tr key={pick.slot}>
                    <td className="mono text-faint">{revealedPicks.length-i}</td>
                    {/* Show surname to admin, anonymous slot number to public */}
                    <td>{adminMode ? state.portfolios[pick.slot].portfolioName : `Portfolio ${pick.slot + 1}`}</td>
                    <td><FlagChip country={pick.country}/></td>
                    <td><span className="badge badge-neutral">Group {pick.group}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {showResetConfirm && (
        <Modal title="Reset Draw?" onClose={()=>setShowResetConfirm(false)}>
          <div className="alert alert-warn mb-16">
            This will clear all team and group assignments, reset every fixture result,
            and start a fresh randomized draw sequence. This cannot be undone.
          </div>
          <div className="flex gap-12">
            <button className="btn btn-ghost btn-full" onClick={()=>setShowResetConfirm(false)}>Cancel</button>
            <button className="btn btn-primary btn-full" onClick={confirmReset}>Reset Draw</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============================================================
   FIXTURES TAB
   ============================================================ */
function FixturesTab({state, updateState, adminMode}){
  const [weekFilter, setWeekFilter] = useState("1");
  const [groupFilter, setGroupFilter] = useState("all");
  const [editFixture, setEditFixture] = useState(null);

  const weekOptions = [
    {v:"1", l:"Matchday 1"},
    {v:"2", l:"Matchday 2"},
    {v:"3", l:"Matchday 3"},
    {v:"R16", l:"Round of 16"},
    {v:"QF", l:"Quarter-Final"},
    {v:"SF", l:"Semi-Final"},
    {v:"F", l:"Final"},
  ];

  const fixtures = useMemo(()=>{
    return state.fixtures.filter(f=>{
      if(f.stage==="group"){
        if(String(f.matchday)!==weekFilter) return false;
        if(groupFilter!=="all" && f.group!==groupFilter) return false;
        return true;
      } else {
        return f.round===weekFilter;
      }
    });
  },[state.fixtures, weekFilter, groupFilter]);

  const isGroupWeek = ["1","2","3"].includes(weekFilter);

  const handleSaveFixture = (fixtureId, dealsA, dealsB, disbA, disbB)=>{
    updateState(prev=>{
      const fixtures = prev.fixtures.map(f=>{
        if(f.id!==fixtureId) return f;
        return {
          ...f,
          deals: {A:dealsA, B:dealsB},
          disb: {A:disbA, B:disbB},
          status: f.status==="red" ? "red" : "live",
          scoreSaved: true,
        };
      });
      // NOTE: We do NOT update ytdHistory from fixture disb amounts.
      // portfolio.ytd on the Teams tab is the pre-match YTD balance and is managed separately.
      return {...prev, fixtures};
    });
    setEditFixture(null);
  };

  const handleMarkFinal = (fixtureId)=>{
    updateState(prev=>{
      const fixtures = prev.fixtures.map(f=>
        f.id===fixtureId ? {...f, status:"green", scoreSaved:true} : f
      );
      return {...prev, fixtures};
    });
  };

  return (
    <div>
      <div className="section-head">
        <div>
          <span className="eyebrow">Fixtures</span>
          <div className="section-title">Match Schedule</div>
          <div className="section-sub mt-8">
            {weekOptions.find(w=>w.v===weekFilter)?.l}
            {isGroupWeek && ` · Week starting ${MATCHDAYS[Number(weekFilter)-1].weekStart}`}
            {!isGroupWeek && ` · Week starting ${BRACKET_WEEKS[weekFilter].weekStart}`}
          </div>
        </div>
        <div className="flex gap-12" style={{flexWrap:"wrap"}}>
          <select value={weekFilter} onChange={e=>{setWeekFilter(e.target.value); setGroupFilter("all");}}
            style={{padding:"10px 14px", borderRadius:"9px", border:"1px solid var(--line-strong)", background:"rgba(255,255,255,0.05)", color:"var(--white)", fontSize:"13px"}}>
            {weekOptions.map(w=><option key={w.v} value={w.v}>{w.l}</option>)}
          </select>
          {isGroupWeek && (
            <select value={groupFilter} onChange={e=>setGroupFilter(e.target.value)}
              style={{padding:"10px 14px", borderRadius:"9px", border:"1px solid var(--line-strong)", background:"rgba(255,255,255,0.05)", color:"var(--white)", fontSize:"13px"}}>
              <option value="all">All Groups</option>
              {GROUP_NAMES.map(g=><option key={g} value={g}>Group {g}</option>)}
            </select>
          )}
        </div>
      </div>

      {fixtures.length===0 ? (
        <EmptyState icon="📅" text="No fixtures for this selection yet — bracket slots populate once the group stage is complete."/>
      ) : (
        <div className="grid grid-2">
          {fixtures.map(f=>{
            const teamAReady = f.teamA!==null;
            const teamBReady = f.teamB!==null;
            return (
              <div key={f.id} className={"match-card status-"+fixtureColor(f)}>
                <div className="match-card-head">
                  <span>{f.stage==="group" ? `Group ${f.group} · MD${f.matchday}` : weekOptions.find(w=>w.v===f.round)?.l}</span>
                  <StatusBadge status={f.status}/>
                </div>
                <div className="match-card-body">
                  {(!teamAReady || !teamBReady) ? (
                    <div className="text-faint fs-13 text-center" style={{padding:"10px 0"}}>Awaiting bracket qualification</div>
                  ) : (
                    <React.Fragment>
                      <MatchScoreLine state={state} fixture={f} adminMode={adminMode}/>
                      <div className="match-meta">
                        {f.deals.A!==null && <span className="badge badge-neutral">Deals: {f.deals.A} – {f.deals.B}</span>}
                        {/* Raw disbursement amounts are confidential — only admins see the R-value */}
                        {adminMode && f.disb.A!==null && (
                          <span className="badge badge-neutral mono">Match Disb: {fmtCurrency(f.disb.A)} / {fmtCurrency(f.disb.B)}</span>
                        )}
                      </div>
                      {adminMode && (
                        <div className="mt-12 flex gap-8">
                          <button className="btn btn-sm" style={{flex:1}} onClick={()=>setEditFixture(f)}>
                            {f.deals.A!==null ? "Update Result" : "Enter Result"}
                          </button>
                          {f.status==="live" && (
                            <button className="btn btn-sm btn-gold" style={{flex:1}} onClick={()=>handleMarkFinal(f.id)}>
                              Mark as Final
                            </button>
                          )}
                        </div>
                      )}
                    </React.Fragment>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editFixture && (
        <FixtureEditModal state={state} fixture={editFixture} onClose={()=>setEditFixture(null)} onSave={handleSaveFixture}/>
      )}
    </div>
  );
}

function FixtureEditModal({state, fixture, onClose, onSave}){
  const teamA = getTeam(state, fixture.teamA);
  const teamB = getTeam(state, fixture.teamB);
  const pA = state.portfolios[fixture.teamA];
  const pB = state.portfolios[fixture.teamB];
  const [dealsA, setDealsA] = useState(fixture.deals.A ?? "");
  const [dealsB, setDealsB] = useState(fixture.deals.B ?? "");
  const [disbA, setDisbA] = useState(fixture.disb.A ?? "");
  const [disbB, setDisbB] = useState(fixture.disb.B ?? "");

  // Live score preview using new formula
  const previewScoreA = calculateMatchScoreIncrease(pA?.ytd, disbA, pA?.annualTarget);
  const previewScoreB = calculateMatchScoreIncrease(pB?.ytd, disbB, pB?.annualTarget);
  const beforeA = pA && pA.annualTarget ? ((parseMoneyNumber(pA.ytd) / parseMoneyNumber(pA.annualTarget)) * 100) : 0;
  const afterA  = pA && pA.annualTarget ? (((parseMoneyNumber(pA.ytd) + parseMoneyNumber(disbA)) / parseMoneyNumber(pA.annualTarget)) * 100) : 0;
  const beforeB = pB && pB.annualTarget ? ((parseMoneyNumber(pB.ytd) / parseMoneyNumber(pB.annualTarget)) * 100) : 0;
  const afterB  = pB && pB.annualTarget ? (((parseMoneyNumber(pB.ytd) + parseMoneyNumber(disbB)) / parseMoneyNumber(pB.annualTarget)) * 100) : 0;

  const previewStyle = {
    background:"rgba(255,255,255,0.04)", border:"1px solid var(--line-strong)",
    borderRadius:"9px", padding:"12px 14px", fontSize:"12.5px", marginBottom:"14px",
  };
  const rowStyle = {display:"flex", justifyContent:"space-between", padding:"3px 0"};
  const labelStyle = {color:"var(--text-faint)"};
  const valStyle = {fontFamily:"var(--font-mono)", fontWeight:700};
  const scoreStyle = {...valStyle, color: previewScoreA>previewScoreB ? "#5fd996" : previewScoreA<previewScoreB ? "#ff6b7f" : "var(--gold)"};
  const scoreBStyle = {...valStyle, color: previewScoreB>previewScoreA ? "#5fd996" : previewScoreB<previewScoreA ? "#ff6b7f" : "var(--gold)"};

  return (
    <Modal title="Enter Match Result" onClose={onClose} wide>
      <div className="card-flat" style={{padding:"14px", marginBottom:"16px"}}>
        <div className="fs-13 text-light mb-8">{fixture.stage==="group" ? `Group ${fixture.group} · Matchday ${fixture.matchday}` : `Knockout · ${fixture.round}`}</div>
        <div className="flex justify-between items-center">
          <FlagChip country={teamA?.country}/>
          <span className="text-faint fs-12">vs</span>
          <FlagChip country={teamB?.country}/>
        </div>
      </div>

      <div className="grid grid-2">
        <div>
          <div className="field">
            <label>{teamA?.country?.name || "Team A"} — Amount Disbursed This Match (R)</label>
            <input type="number" value={disbA} onChange={e=>setDisbA(e.target.value)} placeholder="e.g. 50000"/>
          </div>
          <div style={previewStyle}>
            <div className="fs-12 fw-700 mb-8" style={{textTransform:"uppercase",letterSpacing:"0.07em",color:"var(--text-light)"}}>Score Preview</div>

function ResultsTab({state}){  /* updateState intentionally omitted — public tab, no tournament_state writes */
  const [disputeMatch, setDisputeMatch] = useState(null);
  const [feedbackMatch, setFeedbackMatch] = useState(null);
  // disputes loaded from match_disputes table (separate from tournament_state)
  const [disputes, setDisputes] = useState([]);
  const [disputesLoading, setDisputesLoading] = useState(true);
  const disputeOpen = isDisputeWindowOpen();

  // Load disputes from Supabase on mount
  useEffect(()=>{
    let mounted = true;
    (async ()=>{
      const rows = await loadDisputes();
      if(mounted){ setDisputes(rows); setDisputesLoading(false); }
    })();
    return ()=>{ mounted=false; };
  },[]);

  const finalFixtures = useMemo(()=>{
    return state.fixtures.filter(f=>f.teamA!==null && f.teamB!==null && (f.status==="green" || f.status==="red"));
  },[state.fixtures]);

  // Public submit: insert into match_disputes ONLY. Never calls updateState.
  // Returns {ok, error} from submitDispute so the modal can show field errors.
  const handleSubmitDispute = async (matchId, name, reason)=>{
    const result = await submitDispute(matchId, name, reason);
    if(result.ok){
      // Optimistically add to local list so the viewer sees "awaiting review" immediately.
      // Values have already been trimmed and validated by submitDispute.
      setDisputes(prev=>[{
        id: `local-${Date.now()}`,
        tournament_id: TOURNAMENT_ID,
        match_id: matchId,
        name:   name.trim(),
        reason: reason.trim(),
        status: 'open',
        created_at: new Date().toISOString(),
        feedback: null,
      }, ...prev]);
    }
    return result;   // {ok, error} — modal decides whether to close
  };

  const labelFor = (f)=> f.stage==="group" ? `Group ${f.group} · Matchday ${f.matchday}` : ({R16:"Round of 16",QF:"Quarter-Final",SF:"Semi-Final",F:"Final"}[f.round]);

  return (
    <div>
      <div className="section-head">
        <div>
          <span className="eyebrow">Results</span>
          <div className="section-title">Final &amp; Disputed Matches</div>
        </div>
      </div>

      <div className="alert alert-info mb-16">
        Only <strong>GREEN</strong> matches are final and count toward standings, the bracket, and awards.
        <strong> RED</strong> matches are under dispute and excluded until resolved.
        {" "}Disputes can be submitted Monday to Friday{disputeOpen ? " — the window is open today." : " — the window is currently closed (weekends)."}
      </div>

      {finalFixtures.length===0 ? (
        <EmptyState icon="🏁" text="No results have been entered yet."/>
      ) : (
        <div className="grid grid-2">
          {finalFixtures.map(f=>{
            // Look up disputes for this fixture from the match_disputes table
            const fixtureDisputes = disputes.filter(d=>d.match_id===f.id);
            const resolvedWithFeedback = fixtureDisputes.find(d=>d.status==="resolved" && d.feedback);
            const hasOpenDispute = fixtureDisputes.some(d=>d.status==="open");
            const showFeedback = f.status==="green" && resolvedWithFeedback;
            return (
              <div key={f.id} className={"match-card status-"+fixtureColor(f)}>
                <div className="match-card-head">
                  <span>{labelFor(f)}</span>
                  <StatusBadge status={f.status}/>
                </div>
                <div className="match-card-body">
                  <MatchScoreLine state={state} fixture={f} adminMode={false}/>
                  <div className="match-meta">
                    {f.status==="green" && !showFeedback && !hasOpenDispute && (
                      <button className="btn btn-sm" onClick={()=>setDisputeMatch(f)} disabled={!disputeOpen}>
                        Submit Dispute
                      </button>
                    )}
                    {f.status==="green" && hasOpenDispute && (
                      <span className="badge badge-gold">⏳ Dispute submitted — awaiting review</span>
                    )}
                    {showFeedback && (
                      <button className="btn btn-sm btn-gold" onClick={()=>setFeedbackMatch({fixture:f, dispute:resolvedWithFeedback})}>
                        💬 Feedback
                      </button>
                    )}
                    {f.status==="red" && (
                      <span className="badge badge-red">Awaiting admin resolution</span>
                    )}
                  </div>
                  {!disputeOpen && f.status==="green" && !showFeedback && !hasOpenDispute && (
                    <div className="text-faint fs-12 mt-8">Disputes can only be submitted Monday to Friday.</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {disputeMatch && (
        <DisputeModal state={state} fixture={disputeMatch} onClose={()=>setDisputeMatch(null)} onSubmit={handleSubmitDispute}/>
      )}
      {feedbackMatch && (
        <Modal title="Admin Feedback" onClose={()=>setFeedbackMatch(null)}>
          <div className="card-flat" style={{padding:"14px", marginBottom:"14px"}}>
            <div className="fs-13 text-light mb-8">{labelFor(feedbackMatch.fixture)}</div>
            <div className="flex justify-between items-center">
              <FlagChip country={getTeam(state,feedbackMatch.fixture.teamA)?.country}/>
              <span className="text-faint fs-12">vs</span>
              <FlagChip country={getTeam(state,feedbackMatch.fixture.teamB)?.country}/>
            </div>
          </div>
          <div className="field">
            <label>Response from Admin</label>
            {/* feedbackMatch.dispute.feedback is a plain string from Supabase.
                Rendered as a React text node — never as raw HTML. */}
            <div className="card-flat" style={{padding:"14px", fontSize:"14px", lineHeight:"1.6"}}>
              {feedbackMatch.dispute.feedback}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function DisputeModal({state, fixture, onClose, onSubmit}){
  const [name,     setName]     = useState("");
  const [reason,   setReason]   = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [submitted,  setSubmitted]  = useState(false);
  const [submitError, setSubmitError] = useState("");
  const teamA = getTeam(state, fixture.teamA);
  const teamB = getTeam(state, fixture.teamB);

  // Client-side validation mirrors submitDispute() server-side guard.
  // All values are rendered as React text nodes — never as raw HTML.
  const nameTrimmed   = name.trim();
  const reasonTrimmed = reason.trim();
  const nameValid   = nameTrimmed.length >= 2 && nameTrimmed.length <= 120;
  const reasonValid = reasonTrimmed.length >= 5 && reasonTrimmed.length <= 1000;
  const canSubmit   = nameValid && reasonValid && !submitting;

  const nameError   = nameTrimmed.length > 0 && !nameValid
    ? (nameTrimmed.length < 2 ? "Name must be at least 2 characters." : "Name must be 120 characters or fewer.")
    : null;
  const reasonError = reasonTrimmed.length > 0 && !reasonValid
    ? (reasonTrimmed.length < 5 ? "Reason must be at least 5 characters." : "Reason must be 1000 characters or fewer.")
    : null;

  const handleSubmit = async ()=>{
    setSubmitting(true);
    setSubmitError("");
    // onSubmit returns {ok, error} — never touches tournament_state.
    const result = await onSubmit(fixture.id, nameTrimmed, reasonTrimmed);
    setSubmitting(false);
    if(result.ok){
      setSubmitted(true);
    } else {
      // result.error is a plain string — rendered as a text node, not HTML.
      setSubmitError(result.error || "Failed to submit. Please try again.");
    }
  };

  if(submitted){
    return (
      <Modal title="Dispute Submitted" onClose={onClose}>
        <div className="text-center" style={{padding:"20px 0"}}>
          <div style={{fontSize:"40px", marginBottom:"12px"}}>✅</div>
          {/* Plain text nodes — no dangerouslySetInnerHTML anywhere in this component */}
          <div className="fs-14 text-light mb-16">
            Your dispute has been recorded and will be reviewed by an admin.
            The match result remains in place until resolved.
          </div>
          <button className="btn btn-primary btn-full" onClick={onClose}>Close</button>
        </div>
      </Modal>
    );
  }

  return (
    <Modal title="Submit Dispute" onClose={onClose}>
      {/* Match preview — country names rendered as text nodes */}
      <div className="card-flat" style={{padding:"14px", marginBottom:"16px"}}>
        <div className="flex justify-between items-center">
          <FlagChip country={teamA?.country}/>
          <span className="text-faint fs-12">vs</span>
          <FlagChip country={teamB?.country}/>
        </div>
      </div>

      {/* Name field — 2–120 chars required */}
      <div className="field">
        <label>Your Name <span className="text-faint" style={{fontWeight:400,textTransform:"none"}}>(2–120 chars)</span></label>
        <input
          value={name}
          onChange={e=>setName(e.target.value.slice(0, 120))}
          placeholder="Your name"
          maxLength={120}
          autoComplete="name"
        />
        {nameError && <div className="fs-12 text-red mt-8" role="alert">{nameError}</div>}
      </div>

      {/* Reason field — 5–1000 chars required */}
      <div className="field">
        <label>Dispute Reason <span className="text-faint" style={{fontWeight:400,textTransform:"none"}}>(5–1000 chars)</span></label>
        <textarea
          rows="4"
          value={reason}
          onChange={e=>setReason(e.target.value.slice(0, 1000))}
          placeholder="Describe the issue with this result…"
          maxLength={1000}
        />
        <div className="fs-12 text-faint" style={{textAlign:"right"}}>
          {reasonTrimmed.length}/1000
        </div>
        {reasonError && <div className="fs-12 text-red mt-8" role="alert">{reasonError}</div>}
      </div>

      <div className="alert alert-warn mb-12">
        Your dispute will be logged for admin review.
        The match will remain as-is until an admin investigates and takes action.
      </div>

      {/* submitError is a plain string from submitDispute — rendered as text node */}
      {submitError && (
        <div className="alert alert-error mb-12" role="alert">{submitError}</div>
      )}

      <button
        className="btn btn-primary btn-full"
        disabled={!canSubmit}
        onClick={handleSubmit}
        aria-busy={submitting}
      >
        {submitting ? "Submitting…" : "Submit Dispute"}
      </button>
    </Modal>
  );
}
