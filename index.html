function TeamsTab({state, updateState, adminMode}){
  const [activeWeek, setActiveWeek] = useState(state.activeWeek || 1);
  const [edits, setEdits] = useState({}); // slot -> {portfolioName, annualTarget, ytd}
  const [targetsUnlocked, setTargetsUnlocked] = useState(false);

  const drawnPortfolios = state.portfolios.filter(p=>p.country);

  const getVal = (p, field)=>{
    if(edits[p.slot] && edits[p.slot][field]!==undefined) return edits[p.slot][field];
    if(field==="ytd") return p.ytdHistory[activeWeek] ?? p.ytd ?? "";
    if(field==="deals") return (p.dealsHistory && p.dealsHistory[activeWeek]) ?? "";
    return p[field];
  };

  const setVal = (slot, field, value)=>{
    setEdits(prev=>({...prev, [slot]:{...prev[slot], [field]:value}}));
  };

  const handleSaveAll = ()=>{
    updateState(prev=>{
      const portfolios = prev.portfolios.map(p=>{
        const e = edits[p.slot];
        if(!e) return p;
        const updated = {...p};
        if(e.portfolioName!==undefined) updated.portfolioName = e.portfolioName;
        if(targetsUnlocked && e.annualTarget!==undefined) updated.annualTarget = Number(e.annualTarget)||0;
        if(e.ytd!==undefined && e.ytd!==""){
          updated.ytd = Number(e.ytd);
          updated.ytdHistory = {...updated.ytdHistory, [activeWeek]: Number(e.ytd)};
        }
        if(e.deals!==undefined && e.deals!==""){
          updated.dealsHistory = {...(updated.dealsHistory||{}), [activeWeek]: Number(e.deals)||0};
        }
        return updated;
      });
      return {...prev, portfolios, activeWeek};
    });
    setEdits({});
    setTargetsUnlocked(false);
  };

  const weekOptions = [
    {v:1, l:"Matchday 1"}, {v:2, l:"Matchday 2"}, {v:3, l:"Matchday 3"},
    {v:"R16", l:"Round of 16"}, {v:"QF", l:"Quarter-Final"}, {v:"SF", l:"Semi-Final"}, {v:"F", l:"Final"},
  ];

  return (
    <div>
      <div className="section-head">
        <div>
          <span className="eyebrow">Teams</span>
          <div className="section-title">{adminMode ? "Portfolio Profiles" : "Teams"}</div>
          <div className="section-sub mt-8">
            {adminMode
              ? "YTD % = current YTD disbursement ÷ annual target · YTD is the pre-match balance used for scoring"
              : "YTD % = portfolio attainment score · Deals = count of deals closed this period"}
          </div>
        </div>
        {adminMode && (
          <div className="flex gap-12 items-center" style={{flexWrap:"wrap"}}>
            <div className="flex gap-8 items-center">
              <span className="fs-12 text-light fw-700" style={{textTransform:"uppercase", letterSpacing:"0.08em"}}>Active Week:</span>
              <select value={activeWeek} onChange={e=>{
                  const v = e.target.value;
                  setActiveWeek(isNaN(Number(v)) ? v : Number(v));
                  setEdits({});
                }}
                style={{padding:"9px 12px", borderRadius:"9px", border:"1px solid var(--line-strong)", background:"rgba(255,255,255,0.05)", color:"var(--white)", fontSize:"13px"}}>
                {weekOptions.map(w=><option key={w.v} value={w.v}>{w.l}</option>)}
              </select>
            </div>
            <button className={"btn btn-sm" + (targetsUnlocked ? " active" : "")}
              onClick={()=>setTargetsUnlocked(v=>!v)}
              style={targetsUnlocked ? {background:"var(--gold)", borderColor:"var(--gold)", color:"var(--navy-deep)"} : {}}>
              {targetsUnlocked ? "🔓 Editing Targets" : "🔒 Edit Annual Targets"}
            </button>
            <button className="btn btn-primary" onClick={handleSaveAll} disabled={Object.keys(edits).length===0}>Save Changes</button>
          </div>
        )}
      </div>

      {adminMode && targetsUnlocked && (
        <div className="alert alert-warn mb-16">
          Annual targets are normally fixed for the whole tournament. You're editing them now — changes will apply once you click Save Changes.
        </div>
      )}

      {drawnPortfolios.length===0 ? (
        <EmptyState icon="🌍" text="No teams yet — run the Live Draw to assign portfolios to countries and groups."/>
      ) : (
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Group</th>
                <th>Team</th>
                {/* Portfolio name (staff surname) — admin only */}
                {adminMode && <th>Portfolio Name</th>}
                {/* Raw financial values — admin only */}
                {adminMode && <th className="col-right">Annual Target (R)</th>}
                {adminMode && <th className="col-right">YTD Disbursement (R)</th>}
                <th className="col-right">Deals</th>
                <th className="col-right">YTD %</th>
              </tr>
            </thead>
            <tbody>
              {drawnPortfolios.sort((a,b)=> a.group===b.group ? a.slot-b.slot : a.group.localeCompare(b.group)).map(p=>{
                const target = getVal(p,"annualTarget");
                const ytd = getVal(p,"ytd");
                const pct = target ? ((Number(ytd)||0)/Number(target))*100 : 0;
                return (
                  <tr key={p.slot}>
                    <td><span className="badge badge-neutral">{p.group}</span></td>
                    <td><FlagChip country={p.country}/></td>
                    {/* Portfolio name cell — admin only */}
                    {adminMode && (
                      <td>
                        <input value={getVal(p,"portfolioName")} onChange={e=>setVal(p.slot,"portfolioName",e.target.value)}
                          style={{width:"160px", padding:"7px 10px", borderRadius:"7px", border:"1px solid var(--line-strong)", background:"rgba(255,255,255,0.05)", color:"var(--white)", fontSize:"13px"}}/>
                      </td>
                    )}
                    {/* Annual target cell — admin only */}
                    {adminMode && (
                      <td className="col-right">
                        {targetsUnlocked ? (
                          <input type="number" value={getVal(p,"annualTarget")} onChange={e=>setVal(p.slot,"annualTarget",e.target.value)}
                            style={{width:"130px", padding:"7px 10px", borderRadius:"7px", border:"1px solid var(--line-strong)", background:"rgba(255,255,255,0.05)", color:"var(--white)", fontSize:"13px", textAlign:"right"}}/>
                        ) : fmtCurrency(p.annualTarget)}
                      </td>
                    )}
                    {/* YTD disbursement cell — admin only */}
                    {adminMode && (
                      <td className="col-right">
                        <input type="number" value={getVal(p,"ytd")} onChange={e=>setVal(p.slot,"ytd",e.target.value)}
                          style={{width:"130px", padding:"7px 10px", borderRadius:"7px", border:"1px solid var(--line-strong)", background:"rgba(255,255,255,0.05)", color:"var(--white)", fontSize:"13px", textAlign:"right"}}/>
                      </td>
                    )}
                    <td className="col-right">
                      {adminMode ? (
                        <input type="number" value={getVal(p,"deals")} onChange={e=>setVal(p.slot,"deals",e.target.value)}
                          placeholder="0"
                          style={{width:"80px", padding:"7px 10px", borderRadius:"7px", border:"1px solid var(--line-strong)", background:"rgba(255,255,255,0.05)", color:"var(--white)", fontSize:"13px", textAlign:"right"}}/>
                      ) : (getVal(p,"deals") || "—")}
                    </td>
                    <td className="col-right mono fw-700">{target ? fmtPct(pct) : "—"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

  return (
    <div>
      <div className="section-head">
        <div>
          <span className="eyebrow">Bracket</span>
          <div className="section-title">Knockout Stage</div>
          <div className="section-sub mt-8">Round of 16 begins {BRACKET_WEEKS.R16.weekStart} · Final week begins {BRACKET_WEEKS.F.weekStart}</div>
        </div>
      </div>

      {!groupStageDone && (
        <div className="alert alert-info mb-16">
          Bracket slots will populate automatically once all 8 group tables are complete (all group matches marked final/green).
        </div>
      )}

      <div className="bracket-wrap">
        <div className="bracket">
          {rounds.map(round=>(
            <div className="bracket-round" key={round.key}>
              <div className="bracket-round-title">{round.label}</div>
              {round.matches.map(f=>{
                const teamA = getTeam(state, f.teamA);
                const teamB = getTeam(state, f.teamB);
                const result = computeFixtureResult(f, state.portfolios);
                const final = f.status==="green";
                const scoreSaved = f.scoreSaved !== undefined ? f.scoreSaved : final;
                return (
                  <div key={f.id} className={"bracket-match status-"+fixtureColor(f)}>
                    <div className={"bracket-team" + (final && result?.winner==="A" ? " winner":"")}>
                      {teamA ? <FlagChip country={teamA.country}/> : <span className="tbd">TBD</span>}
                      {result && <span className="bscore">{scoreSaved ? fmtPct(result.scoreA) : "0.00%"}</span>}
                    </div>
                    <div className={"bracket-team" + (final && result?.winner==="B" ? " winner":"")}>
                      {teamB ? <FlagChip country={teamB.country}/> : <span className="tbd">TBD</span>}
                      {result && <span className="bscore">{scoreSaved ? fmtPct(result.scoreB) : "0.00%"}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {(()=>{
        const finalFx = state.fixtures.find(f=>f.id==="KO-F-1");
        if(finalFx && finalFx.status==="green"){
          const result = computeFixtureResult(finalFx, state.portfolios);
          const champ = result.winner==="A" ? getTeam(state, finalFx.teamA) : getTeam(state, finalFx.teamB);
          return (
            <div className="card mt-24 text-center" style={{padding:"36px"}}>
              <span className="eyebrow">Champion</span>
              <div className="hero-title mt-12" style={{fontSize:"clamp(28px,5vw,46px)"}}>
                {champ.country.flag} {champ.country.name}
              </div>
              {/* Champion portfolio name shown only to admin */}
              <div className="text-light fs-13 mt-8">
                Regional Cup: GP East 2026
              </div>
            </div>
          );
        }
        return null;
      })()}
    </div>
  );
}

/* ============================================================
   ADMIN SETUP TAB — dispute resolution workflow
   Reads disputes from match_disputes Supabase table.
   Admin can: mark fixture red, resolve dispute, mark fixture green.
   All tournament_state writes go through updateState() (admin only).
   ============================================================ */
function AdminSetupTab({state, updateState}){
  const [disputes, setDisputes] = useState([]);
  const [disputesLoading, setDisputesLoading] = useState(true);
  const [feedbackDrafts, setFeedbackDrafts] = useState({});
  const [resolving, setResolving] = useState({});

  // Load disputes from match_disputes on mount
  useEffect(()=>{
    let mounted = true;
    (async ()=>{
      const rows = await loadDisputes();
      if(mounted){ setDisputes(rows); setDisputesLoading(false); }
    })();
    return ()=>{ mounted=false; };
  },[]);

  const labelFor = (f)=> f.stage==="group" ? `Group ${f.group} · Matchday ${f.matchday}` : ({R16:"Round of 16",QF:"Quarter-Final",SF:"Semi-Final",F:"Final"}[f.round]);

  // Admin marks a fixture as disputed (RED) in tournament_state
  const handleMarkRed = (matchId)=>{
    updateState(prev=>{
      const fixtures = prev.fixtures.map(f=> f.id===matchId ? {...f, status:"red", scoreSaved:true} : f);
      return {...prev, fixtures};
    });
  };

  // Admin resolves a dispute: updates match_disputes row + marks fixture GREEN in tournament_state
  const handleResolve = async (dispute)=>{
    const feedback = feedbackDrafts[dispute.id];
    if(!feedback || !feedback.trim()) return;
    const matchId = dispute.match_id;
    setResolving(prev=>({...prev, [dispute.id]:true}));

    const ok = await resolveDisputeRow(dispute.id, feedback.trim(), 'admin');
    if(ok){
      // Update local state
      setDisputes(prev=>prev.map(d=>
        d.id===dispute.id ? {...d, status:'resolved', feedback:feedback.trim()} : d
      ));
      // Mark fixture green in tournament_state (admin write)
      updateState(prev=>{
        const fixtures = prev.fixtures.map(f=>
          f.id===matchId ? {...f, status:"green", scoreSaved:true} : f
        );
        return {...prev, fixtures};
      });
      setFeedbackDrafts(prev=>{ const n={...prev}; delete n[dispute.id]; return n; });
    }
    setResolving(prev=>({...prev, [dispute.id]:false}));
  };

  // Group disputes by match_id for display
  const disputesByMatch = {};
  disputes.forEach(d=>{
    if(!disputesByMatch[d.match_id]) disputesByMatch[d.match_id] = [];
    disputesByMatch[d.match_id].push(d);
  });

  // Fixtures that have open disputes (not yet resolved)
  const fixturesWithOpenDisputes = state.fixtures.filter(f=>
    f.teamA!==null && f.teamB!==null &&
    (disputesByMatch[f.id]||[]).some(d=>d.status==="open")
  );

  return (
    <div>
      <div className="section-head">
        <div>
          <span className="eyebrow">Admin Setup</span>
          <div className="section-title">Dispute Resolution</div>
          <div className="section-sub mt-8">Disputes are submitted by viewers into a separate table. Review, provide feedback, and resolve here.</div>
        </div>
      </div>

      {disputesLoading ? (
        <div className="empty-state"><div className="big">⏳</div>Loading disputes…</div>
      ) : fixturesWithOpenDisputes.length===0 ? (
        <EmptyState icon="✅" text="No open disputes. All matches are clear."/>
      ) : (
        <div className="grid grid-2">
          {fixturesWithOpenDisputes.map(f=>{
            const teamA = getTeam(state, f.teamA);
            const teamB = getTeam(state, f.teamB);
            const fixtureDisputes = (disputesByMatch[f.id]||[]).filter(d=>d.status==="open");
            const latestDispute = fixtureDisputes[0];
            return (
              <div key={f.id} className={"match-card status-"+(f.status==="red"?"red":"pending")}>
                <div className="match-card-head">
                  <span>{labelFor(f)}</span>
                  <StatusBadge status={f.status}/>
                </div>
                <div className="match-card-body">
                  <div className="flex justify-between items-center mb-12">
                    <FlagChip country={teamA?.country}/>
                    <span className="text-faint fs-12">vs</span>
                    <FlagChip country={teamB?.country}/>
                  </div>
                  {latestDispute && (
                    <div className="card-flat mb-12" style={{padding:"12px"}}>
                      <div className="fs-12 text-faint" style={{textTransform:"uppercase", letterSpacing:"0.06em", fontWeight:700}}>Submitted by</div>
                      <div className="fs-14 fw-700 mb-8">{latestDispute.name}</div>
                      <div className="fs-12 text-faint" style={{textTransform:"uppercase", letterSpacing:"0.06em", fontWeight:700}}>Reason</div>
                      {/* latestDispute.reason is rendered as a React text node — never raw HTML */}
                      <div className="fs-13 text-light mb-8">{latestDispute.reason}</div>
                      <div className="fs-12 text-faint">{new Date(latestDispute.created_at).toLocaleString()}</div>
                      <div className="mt-8 flex gap-8">
                        <span className="badge badge-red">{latestDispute.status}</span>
                        {fixtureDisputes.length>1 && <span className="badge badge-neutral">+{fixtureDisputes.length-1} more</span>}
                      </div>
                    </div>
                  )}
                  {/* Admin action: mark fixture red to flag it as disputed in tournament_state */}
                  {f.status!=="red" && (
                    <button className="btn btn-sm w-full mb-8" style={{borderColor:"var(--red)"}}
                      onClick={()=>handleMarkRed(f.id)}>
                      🚩 Flag as Disputed (mark RED)
                    </button>
                  )}
                  <div className="field">
                    <label>Admin Feedback</label>
                    <textarea rows="3" placeholder="Explain the resolution to the viewer…"
                      value={feedbackDrafts[latestDispute?.id]||""}
                      onChange={e=>setFeedbackDrafts(prev=>({...prev,[latestDispute?.id]:e.target.value}))}/>
                  </div>
                  <button className="btn btn-primary btn-full"
                    disabled={!(feedbackDrafts[latestDispute?.id]||"").trim() || resolving[latestDispute?.id]}
                    onClick={()=>handleResolve(latestDispute)}>
                    {resolving[latestDispute?.id] ? "Resolving…" : "Resolve & Mark Final"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div className="card mt-24">
        <span className="eyebrow">All Disputes Log</span>
        <div className="fs-12 text-faint mt-4 mb-12">Sourced from <code>match_disputes</code> table — not stored in tournament state.</div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Match</th>
                <th>Name</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Feedback</th>
                <th>Submitted</th>
              </tr>
            </thead>
            <tbody>
              {disputesLoading ? (
                <tr><td colSpan="6" className="text-faint text-center">Loading…</td></tr>
              ) : disputes.length===0 ? (
                <tr><td colSpan="6" className="text-faint text-center">No disputes submitted yet.</td></tr>
              ) : disputes.map((d,i)=>{
                const f = state.fixtures.find(fx=>fx.id===d.match_id);
                return (
                  <tr key={d.id||i}>
                    <td className="fs-12">{f ? labelFor(f) : d.match_id}</td>
                    <td>{d.name}</td>
                    {/* d.reason and d.feedback are plain strings from Supabase — rendered as text nodes */}
                    <td className="fs-12" style={{whiteSpace:"normal", maxWidth:"200px"}}>{d.reason}</td>
                    <td>{d.status==="open" ? <span className="badge badge-red">Open</span> : <span className="badge badge-green">Resolved</span>}</td>
                    <td className="fs-12" style={{whiteSpace:"normal", maxWidth:"200px"}}>{d.feedback || "—"}</td>
                    <td className="fs-12 text-faint">{d.created_at ? new Date(d.created_at).toLocaleDateString() : "—"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function App(){

  const [tab, setTab] = useState("home");
  // ---- Supabase Auth state ----
  const [session, setSession] = useState(null);
  const [loginEmail, setLoginEmail] = useState("");
  const [loginPassword, setLoginPassword] = useState("");
  const [loginError, setLoginError] = useState("");
  const [authLoading, setAuthLoading] = useState(false);
  // adminMode is true only when there is a valid Supabase Auth session
  const adminMode = !!session;
  const [showAdminLogin, setShowAdminLogin] = useState(false);

  // ---- Supabase Auth: check session on mount + listen for changes ----
  useEffect(()=>{
    let mounted = true;
    supabaseClient.auth.getSession().then(({ data })=>{
      if(mounted) setSession(data?.session ?? null);
    });
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, newSession)=>{
      if(mounted) setSession(newSession ?? null);
    });
    return ()=>{
      mounted = false;
      subscription.unsubscribe();
    };
  },[]);

  // load state on mount — load from Supabase FIRST, only build initial if none exists
  useEffect(()=>{
    let mounted = true;
    (async ()=>{
      const loaded = await loadState();
      if(!mounted) return;
      if(loaded){
        setState(recalcAll(loaded));
      } else {
        const initial = recalcAll(buildInitialState());
        setState(initial);
        // Only seed initial state if authenticated
        const { data: sessionData } = await supabaseClient.auth.getSession();
        if(sessionData?.session) await saveState(initial);
      }
    })();
    return ()=>{ mounted = false; };
  },[]);

  // persist on change — saveState already guards for session internally
  useEffect(()=>{
    if(state) saveState(state);
  },[state]);

  // wrapper to update state with recalculation
  const updateState = useCallback((updater)=>{
    setState(prev=>{
      const next = typeof updater==="function" ? updater(prev) : updater;
      return recalcAll(next);
    });

  const handleAdminToggle = ()=>{
    if(adminMode){
      // Sign out from Supabase — clears the session and sets adminMode=false via listener
      supabaseClient.auth.signOut();
    } else {
      setShowAdminLogin(true);
    }
  };

  const handleAdminLogin = async ()=>{
    setAuthLoading(true);
    setLoginError("");
    const { error } = await supabaseClient.auth.signInWithPassword({
      email: loginEmail,
      password: loginPassword,
    });
    setAuthLoading(false);
    if(error){
      setLoginError(error.message || "Sign-in failed. Check email & password.");
    } else {
      // session is set by onAuthStateChange listener; close modal
      setShowAdminLogin(false);
      setLoginEmail("");
      setLoginPassword("");
      setLoginError("");
    }
  };

          <button className={"btn-mode" + (adminMode?" active":"")} onClick={handleAdminToggle}>
            {adminMode ? "Exit Admin" : "Admin Login"}

      </header>

      <nav className="navbar">
        <div className="navbar-inner">
          {NAV_TABS.map(t=>(
            <button key={t.id} className={"nav-tab"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
      </nav>

      <main className="page">
        {tab==="home" && <HomeTab state={state} setTab={setTab}/>}
        {tab==="draw" && <DrawTab state={state} updateState={updateState} adminMode={adminMode}/>}
        {tab==="fixtures" && <FixturesTab state={state} updateState={updateState} adminMode={adminMode}/>}
        {tab==="results" && <ResultsTab state={state}/>}  {/* no updateState — public tab */}
        {tab==="standings" && <StandingsTab state={state}/>}
        {tab==="teams" && <TeamsTab state={state} updateState={updateState} adminMode={adminMode}/>}
        {tab==="bracket" && <BracketTab state={state}/>}
        {tab==="admin" && adminMode && <AdminSetupTab state={state} updateState={updateState}/>}
      </main>

      {showAdminLogin && (
        <Modal title="Admin Login" onClose={()=>{setShowAdminLogin(false); setLoginEmail(""); setLoginPassword(""); setLoginError("");}}>
          <div className="field">
            <label>Email</label>
            <input type="email" value={loginEmail} placeholder="admin@example.com"
              onChange={e=>setLoginEmail(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") handleAdminLogin(); }}
              autoFocus/>
          </div>
          <div className="field">
            <label>Password</label>
            <input type="password" value={loginPassword} placeholder="Password"
              onChange={e=>setLoginPassword(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") handleAdminLogin(); }}/>
          </div>
          {loginError && <div className="alert alert-error mb-12">{loginError}</div>}
          <button className="btn btn-primary btn-full" onClick={handleAdminLogin} disabled={authLoading}>
            {authLoading ? "Signing in…" : "Sign In"}
          </button>
        </Modal>
      )}
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);



</script>
</body>
</html>
